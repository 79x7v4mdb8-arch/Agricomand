if(!Array.isArray(f)){setError(‘Tables not found. Run the SQL setup in Supabase first.’);setLoading(false);return;}
setFarms(f);setFields(fi);setChems(c);setDrones(d);setJobs(j);setOperators(o);setMaintenance(m);setError(null);
}catch(e){setError(’Connection failed: ’+e.message);}
setLoading(false);
}
useEffect(()=>{loadAll();},[]);

const NAV=[{id:‘dashboard’,icon:‘🏠’,label:‘Dashboard’},{id:‘jobs’,icon:‘📋’,label:‘Jobs’},{id:‘fields’,icon:‘🗺️’,label:‘Fields’},{id:‘chemicals’,icon:‘⚗️’,label:‘Chemicals’},{id:‘fleet’,icon:‘🚁’,label:‘Fleet’},{id:‘compliance’,icon:‘📁’,label:‘Compliance’}];
const TITLES={dashboard:‘Dashboard’,jobs:‘Jobs’,fields:‘Fields & Farms’,chemicals:‘Chemicals’,fleet:‘Fleet’,compliance:‘Compliance’};

if(loading)return React.createElement(‘div’,{className:“h-screen flex items-center justify-center bg-gray-50”},
React.createElement(‘div’,{className:“text-center”},
React.createElement(‘div’,{style:{width:48,height:48,border:‘4px solid #1A3C2E’,borderTopColor:‘transparent’,borderRadius:‘50%’,animation:‘spin 1s linear infinite’,margin:‘0 auto 16px’}}),
React.createElement(‘div’,{className:“font-semibold text-gray-700”},“Connecting to database…”),
React.createElement(‘div’,{className:“text-sm text-gray-400”},“AgriCommand Pro”)
)
);

if(error)return React.createElement(‘div’,{className:“h-screen flex items-center justify-center bg-gray-50 p-6”},
React.createElement(‘div’,{className:“bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center”},
React.createElement(‘div’,{className:“text-5xl mb-4”},“⚠️”),
React.createElement(‘h2’,{className:“text-xl font-bold text-gray-800 mb-2”},“Setup Needed”),
React.createElement(‘p’,{className:“text-gray-500 text-sm mb-4”},error),
React.createElement(Btn,{variant:“amber”,onClick:()=>{setLoading(true);loadAll();}},“Try Again”)
)
);

return React.createElement(‘div’,{className:“flex flex-col h-screen bg-gray-50”,style:{fontFamily:”‘Inter’,‘Segoe UI’,system-ui,sans-serif”}},
React.createElement(‘header’,{style:{background:‘linear-gradient(90deg,#1A3C2E,#0f2318)’},className:“px-4 py-3 flex items-center gap-3 shadow-lg flex-shrink-0”},
React.createElement(‘div’,{className:“w-8 h-8 rounded-lg bg-amber-400 flex items-center justify-center font-black text-xs text-green-900”},“AC”),
React.createElement(‘div’,{className:“flex-1”},
React.createElement(‘div’,{className:“text-white font-bold text-sm”},“AgriCommand Pro”),
React.createElement(‘div’,{className:“text-green-400 text-xs”},“● Live Database”)
),
React.createElement(‘button’,{onClick:()=>setMenuOpen(!menuOpen),className:“text-white text-2xl leading-none”},“☰”)
),
menuOpen&&React.createElement(‘div’,{style:{background:’#0f2318’},className:“flex-shrink-0 px-2 py-2 flex flex-wrap gap-1”},
…NAV.map(item=>React.createElement(‘button’,{key:item.id,onClick:()=>{setNav(item.id);setMenuOpen(false);},className:`px-3 py-2 rounded-lg text-sm font-medium ${nav===item.id?'bg-white/20 text-white':'text-white/60'}`},item.icon+’ ’+item.label))
),
React.createElement(‘div’,{className:“flex-shrink-0 px-4 py-2 bg-white border-b border-gray-100 flex items-center justify-between”},
React.createElement(‘h1’,{className:“font-bold text-gray-800 text-sm”},TITLES[nav]),
React.createElement(‘div’,{className:“flex gap-2”},
React.createElement(Btn,{variant:“ghost”,size:“sm”,onClick:loadAll},“↻ Refresh”),
React.createElement(Btn,{variant:“amber”,size:“sm”,onClick:()=>setNav(‘jobs’)},”+ New Job”)
)
),
React.createElement(‘main’,{className:“flex-1 overflow-y-auto p-4”},
nav===‘dashboard’&&React.createElement(Dashboard,{jobs,farms,fields,chems,drones,operators,setNav}),
nav===‘jobs’&&React.createElement(JobsModule,{jobs,farms,fields,chems,drones,operators,reload:loadAll}),
nav===‘fields’&&React.createElement(FieldsModule,{farms,fields,jobs,reload:loadAll}),
nav===‘chemicals’&&React.createElement(ChemicalsModule,{chems,reload:loadAll}),
nav===‘fleet’&&React.createElement(FleetModule,{drones,maintenance,reload:loadAll}),
nav===‘compliance’&&React.createElement(ComplianceModule,{jobs,farms,fields,chems,drones,operators,reload:loadAll})
),
React.createElement(‘style’,null,`@keyframes spin{to{transform:rotate(360deg)}}`)
);
}

ReactDOM.render(React.createElement(App), document.getElementById(‘root’));
</script>

</body>
</html>
